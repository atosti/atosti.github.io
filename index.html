            function declineReading() {
                tarotButtons.style.display = "none"
                document.getElementById('tarotReading').innerText = "Lame.";
            }

            function randomNoRepeats(array) {
                let copy = array.slice(0);
                return function() {
                    if (copy.length < 1) { copy = array.slice(0); }
                    let index = Math.floor(Math.random() * copy.length);
                    let item = copy[index];
                    copy.splice(index, 1);
                    return item;
                };
            }

            // <!-- TODO - Add a "Tony's thoughts" section to each given read or card. -->
            function acceptReading() {
                let chooser = randomNoRepeats(cards);
                const drawnCards = [chooser(), chooser(), chooser()];
                // Reverse Cards
                for(let i = 0; i < drawnCards.length; i++) {
                    reversed = Math.random() < 0.5;
                    if (reversed) {
                        drawnCards[i] = "Reversed " + drawnCards[i]
                    }
                }
                let reading = [drawnCards[0], drawnCards[1], drawnCards[2]].join(', ').trim();
                // Display result
                tarotButtons.style.display = "none"
                document.getElementById('tarotReading').innerText = reading;
            }
